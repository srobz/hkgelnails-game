<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Holdyn's Nail Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <img src="assets/main_bkg.png" alt="Studio" class="bg-img" id="bg-main">

  <div class="center-flex">
    <img src="assets/logo.png" alt="Holdyn's Nail Studio" class="welcome-logo" id="logo-main" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
    <div class="logo-fallback" id="logo-fallback" style="display:none;">Holdyn's Nail Studio</div>

    <button class="continue-text-btn" id="continue-btn" onclick="enterStudio()">CLICK TO CONTINUE</button>

    <div class="text-box-container" id="textBoxContainer">
      <div class="text-box" id="textBox">Hey bestie, r u ready...</div>
      <button class="play-text-btn" id="play-btn" onclick="completeMessage()">&#9654;</button>
    </div>
  </div>

  <script src="js/game.js"></script>
  <script>
    function enterStudio() {
      playSound('enterStudio');
      document.getElementById('continue-btn').style.display = 'none';
      document.getElementById('textBoxContainer').style.display = 'flex';
    }

    function completeMessage() {
      runTypewriter('textBox', 'Hey bestie, get ready ');

      const btn = document.getElementById('play-btn');
      btn.style.animation = 'none';
      btn.innerHTML = '&#9654;';
      btn.classList.add('next-btn');
      btn.onclick = function() {
        playSound('click');
        window.location.href = 'character-select.html';
      };
    }
  </script>

  <div class="global-footer">
    made with lurv for Holdyn ⋆ ༼ ºل͟º ༽  <a href="https://www.instagram.com/hkgelnails/" target="_blank" style="color: #ffcedc; text-decoration: underline;">follow Holdyn on IG</a>
  </div>
</body>
</html>
